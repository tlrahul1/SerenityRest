serenity.project.name=FakeStore API Automation Suite
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=dynamic
cucumber.execution.order=random
cucumber.plugin=io.cucumber.core.plugin.SerenityReporterParallel
cucumber.plugin=pretty,json:target/cucumber.json,timeline:target/test-results/timeline
cucumber.snippet-type=camelcase
serenity.threads=${parallel.count}

# Code for ReRun Failed Test Execution
serenity.rerun.failing.tests=true
serenity.retries=1
serenity.retry.policy=class
serenity.test.retry.count=1
serenity.retries.failed=all
serenity.test.root=src/test/resources
serenity.outputDirectory=target/site/serenity

# Root folder for all request payload fixtures (read by ApiManager / TestUtils / JsonUtils)
json.body.path=src/test/resources/json_body

#Product API - Payload file locations
createproduct.path=/CreateProductPost/CreateProductValid.json
updatecreateproduct.path=/CreateProductPost/CreateProductCommon.json

updateproduct.path=/UpdateProductPost/UpdateProductValid.json
updateupdateproduct.path=/UpdateProductPost/UpdateProductCommon.json



