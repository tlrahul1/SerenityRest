serenity {
    take.screenshots = FOR_FAILURES
}

environments {
    default {
        fakestore.api = "https://fakestoreapi.com/"
    }
    qa {
        fakestore.api = "https://fakestoreapi.com/"
    }
    sit {
        fakestore.api = "https://fakestoreapi.com/"
    }
    preprod {
        fakestore.api = "https://fakestoreapi.com/"
    }
    dev {
        fakestore.api = "https://fakestoreapi.com/"
    }

    # "all" holds every module's base-path (merged with whichever environment is active).
    # This mirrors the original framework's convention where each <module>.basepath /
    # <module>.master key lives here and the module-family *URL / UrlHandler classes
    # resolve it at class-load time via UrlResolverUtil.
    all {
    product.master = "products"
    cart.master = "carts"
}
}
